name: astrbot_plugin_lifetime_tokens
desc: Unified lifetime token report from AstrBot provider_stats, with merged text and T2I image output.
help: |
  Commands:
  /token_text - unified text report
  /token - unified image report

  Optional config:
  provider_limit - how many top providers to show (default 10, max 50)
